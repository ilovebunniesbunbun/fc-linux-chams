name: Arch Linux CI Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Update system and install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm base-devel cmake glfw-x11 glu libx11 libxext nlohmann-json pkgconf glew glm spdlog python python-pytest

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -S . -DFC2_BUILD_TESTS=ON

    - name: Build project
      run: make -j$(nproc) -C build

    - name: Run C++ Unit Tests (ctest)
      run: ctest --test-dir build --output-on-failure

    - name: Run Python Integration Tests (pytest)
      run: python -m pytest tests/ -v
